<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Attendance Tracker</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  padding: 20px;
}
.container {
  max-width: 800px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}
.controls {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
}
button {
  padding: 5px 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
.present { background-color: #4CAF50; color: white; }
.absent { background-color: #f44336; color: white; }
.summary { margin-top: 20px; }

</style>
</head>
<body>
  <div class="container">
    <h1>Student Attendance Tracker</h1>
    <div class="controls">
      <input type="date" id="datePicker" />
      <select id="classFilter">
        <option value="all">All Classes</option>
        <option value="Class A">Class A</option>
        <option value="Class B">Class B</option>
      </select>
    </div>

    <table id="studentTable">
      <thead>
        <tr>
          <th>Student Name</th>
          <th>Class</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="summary">
      <h3>Summary Dashboard</h3>
      <p>Total Students: <span id="totalStudents">0</span></p>
      <p>Present: <span id="presentCount">0</span></p>
      <p>Absent: <span id="absentCount">0</span></p>
      <p>Attendance %: <span id="attendancePercent">0%</span></p>
    </div>
 </div>
<script>
const students = [
  { name: "John Doe", class: "Class A" },
  { name: "Jane Smith", class: "Class A" },
  { name: "Sam Brown", class: "Class B" },
];

const tableBody = document.querySelector("#studentTable tbody");
const totalStudents = document.getElementById("totalStudents");
const presentCount = document.getElementById("presentCount");
const absentCount = document.getElementById("absentCount");
const attendancePercent = document.getElementById("attendancePercent");
const datePicker = document.getElementById("datePicker");
const classFilter = document.getElementById("classFilter");

function renderTable() {
  const selectedClass = classFilter.value;
  tableBody.innerHTML = "";
  let filtered = students.filter(s => selectedClass === "all" || s.class === selectedClass);
  filtered.forEach(student => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${student.name}</td>
      <td>${student.class}</td>
      <td>
        <button class="present">Present</button>
        <button class="absent">Absent</button>
      </td>`;
    tableBody.appendChild(tr);
  });
  totalStudents.textContent = filtered.length;
}
renderTable();

document.addEventListener("click", e => {
  if (e.target.classList.contains("present") || e.target.classList.contains("absent")) {
    const row = e.target.closest("tr");
    const name = row.children[0].textContent;
    const status = e.target.classList.contains("present") ? "Present" : "Absent";
    const date = datePicker.value || new Date().toISOString().split('T')[0];
    const attendanceData = JSON.parse(localStorage.getItem("attendance")) || [];
    attendanceData.push({ name, date, status });
    localStorage.setItem("attendance", JSON.stringify(attendanceData));
    calculateSummary();
  }
});

function calculateSummary() {
  const data = JSON.parse(localStorage.getItem("attendance")) || [];
  const today = datePicker.value || new Date().toISOString().split('T')[0];
  const todayData = data.filter(a => a.date === today);
  const total = todayData.length;
  const present = todayData.filter(a => a.status === "Present").length;
  totalStudents.textContent = total;
  presentCount.textContent = present;
  absentCount.textContent = total - present;
  attendancePercent.textContent = total ? ((present / total) * 100).toFixed(1) + "%" : "0%";
}
calculateSummary();

</script>

</body>
</html>
